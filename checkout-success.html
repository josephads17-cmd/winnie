<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Confirmation du paiement — La Maison Winnie</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fdf6f0;
        --card: #fffaf6;
        --text: #6f4032;
        --border: #e8c4ac;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }
      main {
        width: min(520px, 100%);
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--card);
        text-align: center;
      }
      h1 { margin: 0 0 12px; font-family: Georgia, serif; }
      p { margin: 0; line-height: 1.6; }
      a { color: inherit; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <h1>Confirmation en cours…</h1>
      <p id="status">Nous vérifions votre paiement sécurisé.</p>
    </main>
    <script>
      (async () => {
        const storageKey = "lmw-checkout-draft-v1";
        const status = document.getElementById("status");
        const sid = new URLSearchParams(window.location.search).get("sid") || "";

        if (!/^cs_(test|live)_[A-Za-z0-9]+$/.test(sid)) {
          status.innerHTML =
            'La confirmation est introuvable. <a href="/">Retourner au site</a>.';
          return;
        }

        try {
          const response = await fetch(
            `https://lmw-checkout.vercel.app/api/verify-checkout?sid=${encodeURIComponent(sid)}`,
            { cache: "no-store" },
          );
          const data = await response.json();

          if (!response.ok || !data.confirmed) {
            throw new Error("Le paiement n’est pas encore confirmé.");
          }

          window.localStorage.removeItem(storageKey);
          window.location.replace(`/merci.html?sid=${encodeURIComponent(sid)}`);
        } catch (error) {
          status.innerHTML =
            'Nous n’avons pas pu confirmer le paiement. <a href="mailto:lamaisonwinnie@gmail.com">Contactez-nous</a> si vous avez été débité.';
        }
      })();
    </script>
  </body>
</html>
