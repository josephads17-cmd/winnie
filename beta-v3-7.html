<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>La Maison Winnie — Beta V3.7</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#FDF6F0}iframe{border:0;width:100%;height:100%;display:block}</style></head><body><iframe id="beta" src="/beta-v3-6.html" title="La Maison Winnie Beta V3.7"></iframe><script>const f=document.getElementById('beta');f.addEventListener('load',()=>{const w=f.contentWindow,d=f.contentDocument;try{d.title='La Maison Winnie — Beta V3.7';const replaceText=(root)=>{const walker=d.createTreeWalker(root,NodeFilter.SHOW_TEXT);let n;while(n=walker.nextNode()){n.nodeValue=n.nodeValue.replace(/minimum de 4 sachets/gi,'aucun minimum de sachets').replace(/minimum 4 sachets requis/gi,'continuer').replace(/0 sur 4 sachets/gi,'0 sachet sélectionné').replace(/Encore 4 à choisir/gi,'Choisissez librement la quantité souhaitée').replace(/livraison offerte à partir de 39\s?€/gi,'livraison offerte dès 29,90 €').replace(/Encore 39,00\s?€ pour obtenir la livraison offerte\./gi,'Encore 29,90 € pour obtenir la livraison offerte.');}};replaceText(d.body);const style=d.createElement('style');style.textContent='.progress-card{display:none!important}.helpbox:has(+ .progress-card){margin-bottom:16px}';d.head.appendChild(style);const oldCalc=w.calc;if(typeof oldCalc==='function'){w.calc=function(){const r=oldCalc();r.ship=r.sub>=29.90?0:4.90;r.total=r.sub+r.ship;return r}}const apply=()=>{replaceText(d.body);const next=d.getElementById('plantsNext');if(next){next.disabled=false;next.textContent='Continuer vers le foin'}const cart=d.getElementById('cartBtn');if(cart){cart.disabled=false;cart.textContent='Valider la Beta';cart.onclick=()=>w.openModal&&w.openModal()}const subEl=d.getElementById('subtotal');const shipEl=d.getElementById('shipping');const totalEl=d.getElementById('total');const note=d.getElementById('deliveryNote');if(subEl&&shipEl&&totalEl&&note){const parse=s=>Number((s||'0').replace(/[^0-9,.-]/g,'').replace(',','.'))||0;const sub=parse(subEl.textContent);const ship=sub>=29.90?0:4.90;shipEl.textContent=ship?'4,90 €':'Offerte';totalEl.textContent=(sub+ship).toLocaleString('fr-FR',{style:'currency',currency:'EUR'});note.textContent=sub>=29.90?'Livraison offerte atteinte.':'Encore '+(29.90-sub).toLocaleString('fr-FR',{style:'currency',currency:'EUR'})+' pour obtenir la livraison offerte.'}const mockShip=d.getElementById('mockShip');const mockTotal=d.getElementById('mockTotal');if(mockShip&&shipEl)mockShip.textContent=shipEl.textContent;if(mockTotal&&totalEl)mockTotal.textContent=totalEl.textContent};const oldRender=w.render;if(typeof oldRender==='function'){w.render=function(){oldRender();apply()}}apply();setTimeout(()=>{if(typeof w.render==='function')w.render();apply()},200);new MutationObserver(()=>apply()).observe(d.body,{subtree:true,childList:true,characterData:true});}catch(e){console.error(e)}});</script></body></html>
