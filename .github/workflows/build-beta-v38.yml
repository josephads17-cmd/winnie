name: Build Beta V3.8
on:
  push:
    paths:
      - '.github/workflows/build-beta-v38.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write beta-v3-8.html
        run: |
          python - <<'PY'
          import base64,gzip
          from pathlib import Path
          data=''
          Path('beta-v3-8.html').write_bytes(gzip.decompress(base64.b64decode(data)))
          PY
      - name: Commit beta
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add beta-v3-8.html
          git commit -m 'Add Beta V3.8 with selected flowers plants and treats'
          git push
