name: Build beta finale

on:
  workflow_dispatch:
  issues:
    types:
      - opened
  push:
    branches:
      - main
    paths:
      - "beta-v3-19.html"
      - "beta-v3-19.css"
      - "beta-v3-19.js"
      - "beta-v3-20.css"
      - "beta-v3-20.js"
      - "beta-v3-21.js"
      - "beta-v3-22.css"
      - "beta-v3-22.js"
      - "beta-v3-23.css"
      - "beta-v3-23.js"
      - "beta-v3-24.css"
      - "beta-v3-24-cart.css"
      - "beta-v3-24.js"
      - "beta-v3-24-instagram.js"
      - "beta-v3-25.css"
      - "beta-v3-25.js"
      - "beta-v3-25-checkout.js"
      - "beta-v3-26.css"
      - "beta-v3-26.js"
      - "beta-v3-27.html"
      - "beta-v3-27.css"
      - "beta-v3-27.js"
      - "beta-v3-27-loading-fix.js"
      - "scripts/build-beta-finale.mjs"
      - ".github/workflows/build-beta-finale.yml"

permissions:
  contents: write
  issues: write

concurrency:
  group: build-beta-finale
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'issues' || github.event.issue.title == '[build] Beta finale'
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Générer la Beta finale
        run: node scripts/build-beta-finale.mjs

      - name: Vérifier que la page n'empile plus les anciennes ressources
        run: |
          test -f beta-finale.html
          test -f beta-finale.css
          test -f beta-finale.js
          test "$(grep -o 'beta-finale\.js' beta-finale.html | wc -l)" -eq 1
          test "$(grep -o 'beta-finale\.css' beta-finale.html | wc -l)" -eq 1
          ! grep -q 'cdn.jsdelivr.net/gh/josephads17-cmd/winnie' beta-finale.html
          ! grep -q 'beta-v3-19.js' beta-finale.html
          ! grep -q 'beta-v3-27.js' beta-finale.html

      - name: Publier les fichiers générés
        run: |
          if git diff --quiet -- beta-finale.html beta-finale.css beta-finale.js beta-finale-manifest.json; then
            echo "La Beta finale est déjà à jour."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add beta-finale.html beta-finale.css beta-finale.js beta-finale-manifest.json
          git commit -m "build: générer la beta finale consolidée"
          git push

      - name: Fermer l'issue technique
        if: github.event_name == 'issues' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Beta finale générée automatiquement."
