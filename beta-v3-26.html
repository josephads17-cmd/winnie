<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>La Maison Winnie — Beta V3.26</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="beta-v3-19.css?v=4" />
    <link rel="stylesheet" href="beta-v3-20.css?v=3" />
    <link rel="stylesheet" href="beta-v3-22.css?v=6" />
    <link rel="stylesheet" href="beta-v3-23.css?v=1" />
    <link rel="stylesheet" href="beta-v3-24.css?v=2" />
    <link rel="stylesheet" href="beta-v3-24-cart.css?v=1" />
    <link rel="stylesheet" href="beta-v3-25.css?v=2" />
    <link rel="stylesheet" href="beta-v3-26.css?v=1" />
    <style>
      .v324-bunny-media { position: relative; }
      .v324-bunny-featured .v324-bunny-media {
        border: 2px solid rgba(216, 137, 104, 0.9);
        box-shadow: 0 20px 55px rgba(95, 57, 43, 0.15);
      }
      .v324-bunny-badge {
        position: absolute;
        z-index: 2;
        top: 14px;
        left: 14px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(67, 42, 34, 0.92);
        color: #fffaf6;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        pointer-events: none;
      }

      @media (max-width: 640px) {
        .v323-botanical-grid {
          display: grid;
          grid-template-columns: none;
          grid-auto-flow: column;
          grid-auto-columns: 84vw;
          gap: 12px;
          overflow-x: auto;
          margin-right: calc(50% - 50vw);
          padding: 2px 18px 12px 0;
          scroll-padding-left: 0;
          scroll-snap-type: x mandatory;
          scrollbar-width: none;
          -webkit-overflow-scrolling: touch;
          overscroll-behavior-inline: contain;
        }

        .v323-botanical-grid::-webkit-scrollbar {
          display: none;
        }

        .v323-botanical-card {
          min-width: 0;
          scroll-snap-align: start;
          scroll-snap-stop: always;
        }

        body:not(.v324-mobile-recap-open) .builder-grid > .cart {
          display: none !important;
        }

        body.v324-mobile-recap-open .builder-grid {
          display: block;
        }

        body.v324-mobile-recap-open .builder-grid > .panel {
          display: none !important;
        }

        body.v324-mobile-recap-open .builder-grid > .cart {
          display: block !important;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="preview-loading" id="previewLoading" role="status">Chargement du configurateur…</div>
    <script>
      (async () => {
        try {
          const response = await fetch(
            "https://cdn.jsdelivr.net/gh/josephads17-cmd/winnie@82e3a271c710785c991dcdbf82916811b6e3ab21/beta-v3-19.html",
            { cache: "no-store" },
          );
          if (!response.ok) throw new Error("Le configurateur n’a pas pu être chargé.");

          const source = await response.text();
          const sourceDocument = new DOMParser().parseFromString(source, "text/html");
          sourceDocument.querySelectorAll("script").forEach((script) => script.remove());
          document.body.innerHTML = sourceDocument.body.innerHTML;

          const heroBadge = document.querySelector(".hero .eyebrow");
          if (heroBadge) heroBadge.textContent = "Beta V3.26";
          const footerVersion = document.querySelector(".footer-meta small");
          if (footerVersion) footerVersion.textContent = "Beta V3.26 — paiement sécurisé par Stripe";

          const loadScript = (src) => new Promise((resolve, reject) => {
            const script = document.createElement("script");
            script.src = src;
            script.onload = resolve;
            script.onerror = reject;
            document.body.appendChild(script);
          });

          await loadScript("beta-v3-19.js?v=5");
          await loadScript("beta-v3-20.js?v=3");
          await loadScript("beta-v3-22.js?v=8");
          await loadScript("beta-v3-21.js?v=4");
          await loadScript("beta-v3-23.js?v=2");
          await loadScript("beta-v3-24.js?v=6");
          await loadScript("beta-v3-24-instagram.js?v=1");
          await loadScript("beta-v3-25.js?v=2");
          await loadScript("beta-v3-25-checkout.js?v=1");
          await loadScript("beta-v3-26.js?v=1");

          const mobileRecapMedia = window.matchMedia("(max-width: 640px)");
          const originalShowRecap = window.showRecap;
          const originalActivateConfiguratorStep = window.activateConfiguratorStep;
          const originalReturnToConfigurator = window.returnToConfigurator;
          const originalGo = window.go;

          const closeMobileRecap = () => {
            document.body.classList.remove("v324-mobile-recap-open");
          };

          window.showRecap = function showRecapV326() {
            if (mobileRecapMedia.matches) {
              document.body.classList.add("v324-mobile-recap-open");
            }
            return originalShowRecap();
          };

          window.activateConfiguratorStep = function activateConfiguratorStepV326(stepNumber) {
            closeMobileRecap();
            return originalActivateConfiguratorStep(stepNumber);
          };

          window.returnToConfigurator = function returnToConfiguratorV326() {
            closeMobileRecap();
            return originalReturnToConfigurator();
          };

          window.go = function goV326(stepNumber) {
            if (Number(stepNumber) !== 4) closeMobileRecap();
            return originalGo(stepNumber);
          };

          const syncMobileRecapViewport = () => {
            if (!mobileRecapMedia.matches) closeMobileRecap();
          };

          if (mobileRecapMedia.addEventListener) {
            mobileRecapMedia.addEventListener("change", syncMobileRecapViewport);
          } else {
            window.addEventListener("resize", syncMobileRecapViewport);
          }

          const targetId = window.location.hash.slice(1);
          const target = targetId && document.getElementById(targetId);
          if (target) requestAnimationFrame(() => target.scrollIntoView());
        } catch (error) {
          document.body.innerHTML = `<p class="preview-error">${error.message}</p>`;
        }
      })();
    </script>
  </body>
</html>
